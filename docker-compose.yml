services:
  # 1. 將服務名稱改為更具識別性的名字
  pico2w_builder:
    build: .
    # 2. 修改映像檔標籤，標註這是針對 pico2w 的編譯環境
    image: pico2w_builder:latest
    
    # 掛載目錄保持不變，這樣你在 Mac 修改程式碼，容器會同步看到
    volumes:
      - .:/workspace
    
    environment:
      - PICO_BOARD=pico2_w
      # 額外建議：強制指定平台為 rp2350，這能確保編譯器選對架構
      - PICO_PLATFORM=rp2350
      
    # 3. 在一鍵編譯指令中，我們也可以調整輸出資料夾名稱
    command: >
      /bin/bash -c "
      cmake -B build_rp2350 -DPICO_BOARD=pico2_w -DCMAKE_BUILD_TYPE=Debug . &&
      cmake --build build_rp2350 -j$(nproc)
      "