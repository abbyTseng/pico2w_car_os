name: CI Quality Gate

# 觸發條件：當 Push 到 main 分支，或發起 Pull Request 時
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- Job 1: 靜態程式碼分析 (Cppcheck) ---
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        #with:
        #  submodules: recursive  # <--- 【關鍵新增】告訴 GitHub 把 FreeRTOS 等子模組也一起拉下來！
      - name: Install Cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run MISRA C Compliance Check
        # 檢查 src 資料夾，啟用所有警告
        run: |
          cppcheck --enable=all --error-exitcode=1 \
          --suppress=missingInclude \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unmatchedSuppression \
          --suppress=staticFunction \
          --suppress=constParameterPointer:src/main.c \
          --suppress=constParameterPointer:src/app/app_priority_lab.c \
          -I src/common -I src/hal -I src/app \
          src/

  # --- Job 2: 單元測試 (Unit Test) ---
  unit-test:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
        #with:
        #  submodules: recursive  # <--- 【關鍵新增】告訴 GitHub 把 FreeRTOS 等子模組也一起拉下來！
      - name: Install CMake & GCC
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure CMake (Test)
        # 這裡會自動讀取 test/CMakeLists.txt
        # 並抓到我們設定好的 Mock 路徑
        run: cmake -S test -B build_test

      - name: Build Tests
        run: cmake --build build_test

      - name: Run Tests (CTest)
        # 💡 關鍵修正：使用 ctest 自動執行所有測試 (Blink + GPIO)
        # --output-on-failure: 只有失敗時才印出詳細錯誤，保持版面乾淨
        run: |
          cd build_test
          ctest --output-on-failure

  # --- Job 3: 韌體編譯 (Firmware Build) ---
  firmware-build:
    runs-on: ubuntu-latest
    needs: unit-test # 測試都過了，才真的去編譯韌體
    steps:
      - uses: actions/checkout@v4
        #with:
        #  submodules: recursive  # <--- 【關鍵新增】告訴 GitHub 把 FreeRTOS 等子模組也一起拉下來！
      # 安裝 ARM Cross Compiler
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      # 下載 Pico SDK
      - name: Setup Pico SDK
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=$PWD" >> $GITHUB_ENV

      # 設定 CMake (指定板子為 pico2_w)
      - name: Configure CMake (Firmware)
        # 這裡的 -S . 代表 source 在根目錄
        run: cmake -S . -B build -DPICO_BOARD=pico2_w

      # 開始編譯 (使用 4 核心加速)
      - name: Build Firmware
        run: cmake --build build -j4