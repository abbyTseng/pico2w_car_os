repos:
  - repo: local
    hooks:
      # --- 1. 自動排版防線 (自動修復) ---
      - id: clang-format
        name: 🎨 Format C/C++ (clang-format)
        entry: clang-format
        args: ["-i"] # -i 代表直接修改檔案 (In-place)
        language: system
        types_or: [c, c++]
        pass_filenames: true

      # --- 2. 靜態分析防線 (阻擋提交) ---
      - id: cppcheck
        name: 🔍 Static Analysis (Cppcheck)
        entry: cppcheck
        language: system
        types: [c]
        args: [
          "--enable=all",
          "--error-exitcode=1",
          "--suppress=missingIncludeSystem",
          "--suppress=unusedFunction",
          "--suppress=unmatchedSuppression",
          "--suppress=missingInclude",
          "-I", "test/mock",
          "-I", "src/common",
          "-I", "src/hal",
          "-I", "src/app",
          "src/"
        ]
        pass_filenames: false

      # --- 3. 單元測試防線 (⚠️ 暫時註解：等待 mock_freertos.h 完成後再開啟) ---
      # - id: docker-unit-test
      #   name: 🐳 Docker Unit Tests (Unity)
      #   entry: ./scripts/run_tests.sh
      #   language: system
      #   pass_filenames: false
      #   always_run: true

exclude: ^lib/|^test/|^build/|^src/ON/|^external/